name: web_search
description: Search the web using DuckDuckGo. No API key required. Use plain text for outputs (no markdown) and avoid using markdown-like symbols (asterisks for bold, hashes for sections etc.).
version: "1.0.0"
enabled: true
command: /search
command_arg: query
command_usage: "/search <query>"

tools:
  - "search:web_search"
