name: brainstorm
description: >
  Multi-agent brainstorming skill. Orchestrates domain-aware specialist agents
  (tech/business/creative), fact-checker, web research, YouTube video analysis,
  and RSS feed context through a Graph pipeline. Produces a confidence-scored
  report with prior brainstorm awareness. Use plain text for outputs (no markdown)
  and avoid using markdown-like symbols (asterisks for bold, hashes for sections etc.).
version: "2.0.0"
enabled: true
command: /brainstorm
command_arg: topic
command_usage: "/brainstorm <topic>"

tools:
  - "brainstorm:brainstorm_topic"
