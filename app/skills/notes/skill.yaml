name: notes
description: Local note-taking backed by JSON files. Save, list, and read notes. Use plain text for outputs (no markdown) and avoid using markdown-like symbols (asterisks for bold, hashes for sections etc.).
version: "1.0.0"
enabled: true
command: /notes
command_usage: "/notes  —  list all notes"

tools:
  - "notes:save_note"
  - "notes:list_notes"
  - "notes:read_note"
